<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="TinDev space intro with data image globe">
  <defs>
    <radialGradient id="bgGlowRight" cx="72%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="46%" stop-color="#7db4ff" stop-opacity="0.050"/>
      <stop offset="100%" stop-color="#03040a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bgGlowLeft" cx="18%" cy="28%" r="36%">
      <stop offset="0%" stop-color="#7d82ff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#03040a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebulaBottom" cx="22%" cy="78%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.055"/>
      <stop offset="100%" stop-color="#03040a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bgMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#01020a"/>
      <stop offset="48%" stop-color="#050712"/>
      <stop offset="100%" stop-color="#02030a"/>
    </linearGradient>

    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="cardLight" cx="10%" cy="4%" r="76%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="52%" stop-color="#243150" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#060914" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cardGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#ffffff" flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="18" stdDeviation="32" flood-color="#000000" flood-opacity="0.30"/>
    </filter>

    <filter id="globeShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#ffffff" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="0" stdDeviation="48" flood-color="#7db4ff" flood-opacity="0.10"/>
    </filter>

    <radialGradient id="vignette" cx="72%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#03040a" stop-opacity="0"/>
      <stop offset="60%" stop-color="#03040a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#03040a" stop-opacity="0.66"/>
    </radialGradient>

    <style>
      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 76px;
        font-weight: 900;
        fill: #fff;
        letter-spacing: -2px;
      }

      .subtitle {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 34px;
        font-weight: 700;
        fill: rgba(255,255,255,0.82);
      }

      .desc {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        font-weight: 600;
        fill: rgba(255,255,255,0.82);
      }

      .descStrong {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        font-weight: 900;
        fill: #ffffff;
      }

      .badgeText {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 2px;
        fill: rgba(255,255,255,0.84);
      }

      .tagText {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 800;
        fill: rgba(255,255,255,0.88);
      }

      .starTiny { fill: rgba(255,255,255,0.72); }
      .starSoft { fill: rgba(255,255,255,0.35); }
      .starBlue { fill: rgba(125,180,255,0.56); }

      .twinkleA { animation: twinkleA 4.8s ease-in-out infinite alternate; }
      .twinkleB { animation: twinkleB 5.8s ease-in-out infinite alternate; }

      .floatGlobe {
        transform-origin: 1120px 450px;
        animation: floatGlobe 6s ease-in-out infinite alternate;
      }

      @keyframes twinkleA {
        from { opacity: .28; }
        to { opacity: .88; }
      }

      @keyframes twinkleB {
        from { opacity: .68; }
        to { opacity: .22; }
      }

      @keyframes floatGlobe {
        from { transform: translateY(-6px); }
        to { transform: translateY(8px); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bgMain)"/>
  <rect width="1600" height="900" fill="url(#bgGlowRight)"/>
  <rect width="1600" height="900" fill="url(#bgGlowLeft)"/>
  <rect width="1600" height="900" fill="url(#nebulaBottom)"/>

  <!-- Stars -->
  <g class="twinkleA">
    <circle class="starTiny" cx="84" cy="104" r="1.4"/>
    <circle class="starTiny" cx="178" cy="212" r="1.1"/>
    <circle class="starTiny" cx="332" cy="86" r="1.3"/>
    <circle class="starTiny" cx="506" cy="158" r="1.0"/>
    <circle class="starTiny" cx="742" cy="82" r="1.2"/>
    <circle class="starTiny" cx="1118" cy="98" r="1.4"/>
    <circle class="starTiny" cx="1394" cy="132" r="1.1"/>
    <circle class="starTiny" cx="1510" cy="248" r="1.3"/>
    <circle class="starTiny" cx="1266" cy="726" r="1.2"/>
    <circle class="starTiny" cx="1438" cy="782" r="1.4"/>
    <circle class="starTiny" cx="272" cy="760" r="1.1"/>
    <circle class="starTiny" cx="96" cy="650" r="1.2"/>
  </g>

  <g class="twinkleB">
    <circle class="starSoft" cx="116" cy="332" r="1"/>
    <circle class="starSoft" cx="238" cy="442" r="1.1"/>
    <circle class="starSoft" cx="486" cy="642" r="1"/>
    <circle class="starSoft" cx="660" cy="544" r="1.2"/>
    <circle class="starSoft" cx="840" cy="228" r="1.1"/>
    <circle class="starSoft" cx="956" cy="706" r="1"/>
    <circle class="starSoft" cx="1048" cy="202" r="1.1"/>
    <circle class="starSoft" cx="1160" cy="802" r="1"/>
    <circle class="starSoft" cx="1328" cy="510" r="1.2"/>
    <circle class="starSoft" cx="1542" cy="620" r="1"/>
  </g>

  <g opacity="0.62">
    <circle class="starBlue" cx="294" cy="318" r="1.8" filter="url(#softGlow)"/>
    <circle class="starBlue" cx="912" cy="138" r="1.6" filter="url(#softGlow)"/>
    <circle class="starBlue" cx="1376" cy="350" r="1.7" filter="url(#softGlow)"/>
    <circle class="starBlue" cx="760" cy="794" r="1.6" filter="url(#softGlow)"/>
  </g>

  <!-- Intro card: đã fix sáng hơn -->
  <g transform="translate(78 118)" filter="url(#cardGlow)">
    <rect x="0" y="0" width="590" height="500" rx="26" fill="#0b1024" fill-opacity="0.66" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.4"/>
    <rect x="1" y="1" width="588" height="498" rx="25" fill="url(#cardLight)"/>
    <circle cx="70" cy="42" r="150" fill="#ffffff" opacity="0.06"/>
    <rect x="15" y="15" width="560" height="470" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.055"/>

    <g transform="translate(30 30)">
      <rect x="0" y="0" width="306" height="42" rx="21" fill="#ffffff" fill-opacity="0.080" stroke="#ffffff" stroke-opacity="0.24"/>
      <text class="badgeText" x="20" y="27">DEVELOPER • AUTOMATION • API</text>
    </g>

    <text class="title" x="30" y="138">Hi there 👋</text>
    <text class="subtitle" x="30" y="186">I'm TinDev</text>

    <text x="30" y="244">
      <tspan class="desc">I'm a developer passionate about </tspan>
      <tspan class="descStrong">coding</tspan>
      <tspan class="desc">,</tspan>
    </text>

    <text x="30" y="284">
      <tspan class="descStrong">automation</tspan>
      <tspan class="desc">, </tspan>
      <tspan class="descStrong">APIs</tspan>
      <tspan class="desc">, and </tspan>
      <tspan class="descStrong">web development</tspan>
      <tspan class="desc">.</tspan>
    </text>

    <text x="30" y="324" class="desc">I enjoy turning ideas into clean, useful,</text>
    <text x="30" y="364" class="desc">and powerful digital tools.</text>

    <g transform="translate(30 398)">
      <rect x="0" y="0" width="74" height="37" rx="18.5" fill="#ffffff" fill-opacity="0.070" stroke="#ffffff" stroke-opacity="0.22"/>
      <text class="tagText" x="37" y="24" text-anchor="middle">Python</text>

      <rect x="88" y="0" width="94" height="37" rx="18.5" fill="#ffffff" fill-opacity="0.070" stroke="#ffffff" stroke-opacity="0.22"/>
      <text class="tagText" x="135" y="24" text-anchor="middle">Web Dev</text>

      <rect x="196" y="0" width="122" height="37" rx="18.5" fill="#ffffff" fill-opacity="0.070" stroke="#ffffff" stroke-opacity="0.22"/>
      <text class="tagText" x="257" y="24" text-anchor="middle">Automation</text>

      <rect x="332" y="0" width="110" height="37" rx="18.5" fill="#ffffff" fill-opacity="0.070" stroke="#ffffff" stroke-opacity="0.22"/>
      <text class="tagText" x="387" y="24" text-anchor="middle">API Tools</text>
    </g>

    <rect x="30" y="462" width="92" height="4" rx="2" fill="url(#lineGlow)" filter="url(#softGlow)"/>
  </g>

  <!-- Globe dùng data:image SVG, nhẹ hơn Three.js -->
  <g class="floatGlobe" filter="url(#globeShadow)">
    <image x="865" y="195" width="510" height="510" preserveAspectRatio="xMidYMid meet"
      href="data:image/svg+xml;base64,"/>
  </g>

  <!-- Soft vignette -->
  <rect width="1600" height="900" fill="#03040a" fill-opacity="0.08"/>
  <rect width="1600" height="900" fill="url(#vignette)" pointer-events="none"/>
</svg>
