<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="TinDev black and white GitHub README banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="48%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#101010"/>
    </linearGradient>

    <radialGradient id="spotRight" cx="74%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0.045"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="spotLeft" cx="18%" cy="24%" r="36%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cardFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a" stop-opacity="0.96"/>
      <stop offset="55%" stop-color="#0d0d0d" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0.88"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cardGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#ffffff" flood-opacity="0.12"/>
    </filter>

    <clipPath id="globeClip">
      <circle cx="1115" cy="445" r="220"/>
    </clipPath>

    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .muted { fill: rgba(255,255,255,0.68); }
      .soft { fill: rgba(255,255,255,0.52); }
      .white { fill: #ffffff; }
      .tinyStar { fill: rgba(255,255,255,0.75); }
      .dimStar { fill: rgba(255,255,255,0.33); }
      .terminal { font-family: Consolas, Monaco, "Courier New", monospace; }

      .title {
        font-size: 86px;
        font-weight: 900;
        letter-spacing: -4px;
      }

      .sub {
        font-size: 31px;
        font-weight: 800;
      }

      .desc {
        font-size: 21px;
        font-weight: 600;
      }

      .badgeText {
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 2.6px;
      }

      .tagText {
        font-size: 15px;
        font-weight: 900;
      }

      .codeText {
        font-size: 17px;
        font-weight: 800;
      }

      .globeStrong {
        fill: none;
        stroke: #ffffff;
        stroke-width: 2.4;
        opacity: 0.92;
        filter: url(#glow);
      }

      .globeSoft {
        fill: none;
        stroke: #ffffff;
        stroke-width: 1.45;
        opacity: 0.34;
      }

      .orbit {
        fill: none;
        stroke: #ffffff;
        stroke-width: 1.25;
        opacity: 0.18;
        stroke-dasharray: 10 14;
      }

      .pulseA { animation: pulseA 4.6s ease-in-out infinite alternate; }
      .pulseB { animation: pulseB 5.8s ease-in-out infinite alternate; }
      @keyframes pulseA { from { opacity: .24; } to { opacity: .90; } }
      @keyframes pulseB { from { opacity: .70; } to { opacity: .20; } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#spotRight)"/>
  <rect width="1600" height="900" fill="url(#spotLeft)"/>

  <!-- Monochrome stars -->
  <g class="pulseA">
    <circle class="tinyStar" cx="76" cy="96" r="1.3"/>
    <circle class="tinyStar" cx="190" cy="210" r="1.1"/>
    <circle class="tinyStar" cx="382" cy="84" r="1.2"/>
    <circle class="tinyStar" cx="528" cy="166" r="1.0"/>
    <circle class="tinyStar" cx="718" cy="92" r="1.3"/>
    <circle class="tinyStar" cx="1008" cy="118" r="1.0"/>
    <circle class="tinyStar" cx="1384" cy="122" r="1.3"/>
    <circle class="tinyStar" cx="1516" cy="278" r="1.1"/>
    <circle class="tinyStar" cx="1270" cy="752" r="1.2"/>
    <circle class="tinyStar" cx="1436" cy="802" r="1.4"/>
    <circle class="tinyStar" cx="262" cy="758" r="1.0"/>
    <circle class="tinyStar" cx="92" cy="650" r="1.1"/>
  </g>

  <g class="pulseB">
    <circle class="dimStar" cx="122" cy="330" r="1"/>
    <circle class="dimStar" cx="260" cy="460" r="1.1"/>
    <circle class="dimStar" cx="492" cy="666" r="1"/>
    <circle class="dimStar" cx="664" cy="544" r="1.1"/>
    <circle class="dimStar" cx="828" cy="234" r="1.0"/>
    <circle class="dimStar" cx="964" cy="706" r="1"/>
    <circle class="dimStar" cx="1050" cy="198" r="1.1"/>
    <circle class="dimStar" cx="1170" cy="802" r="1"/>
    <circle class="dimStar" cx="1328" cy="514" r="1.1"/>
    <circle class="dimStar" cx="1546" cy="620" r="1"/>
  </g>

  <!-- Grid accents -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="1">
    <path d="M0 760H1600"/>
    <path d="M0 680H1600"/>
    <path d="M0 600H1600"/>
    <path d="M0 520H1600"/>
    <path d="M0 440H1600"/>
    <path d="M0 360H1600"/>
    <path d="M0 280H1600"/>
    <path d="M0 200H1600"/>
    <path d="M120 0V900"/>
    <path d="M240 0V900"/>
    <path d="M360 0V900"/>
    <path d="M480 0V900"/>
    <path d="M600 0V900"/>
    <path d="M720 0V900"/>
    <path d="M840 0V900"/>
    <path d="M960 0V900"/>
    <path d="M1080 0V900"/>
    <path d="M1200 0V900"/>
    <path d="M1320 0V900"/>
    <path d="M1440 0V900"/>
  </g>

  <!-- Left info card -->
  <g transform="translate(78 92)" filter="url(#cardGlow)">
    <rect x="0" y="0" width="610" height="585" rx="30" fill="url(#cardFill)" stroke="#ffffff" stroke-opacity="0.26" stroke-width="1.4"/>
    <rect x="18" y="18" width="574" height="549" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

    <!-- top dots -->
    <circle cx="42" cy="43" r="6" fill="#ffffff" opacity="0.85"/>
    <circle cx="64" cy="43" r="6" fill="#ffffff" opacity="0.50"/>
    <circle cx="86" cy="43" r="6" fill="#ffffff" opacity="0.28"/>

    <g transform="translate(32 72)">
      <rect x="0" y="0" width="318" height="42" rx="21" fill="#ffffff" fill-opacity="0.085" stroke="#ffffff" stroke-opacity="0.20"/>
      <text class="font badgeText muted" x="22" y="27">DEVELOPER • AUTOMATION • API</text>
    </g>

    <text class="font title white" x="32" y="188">Hi there</text>
    <text class="font sub muted" x="36" y="232">I'm TinDev</text>

    <rect x="34" y="260" width="120" height="4" rx="2" fill="url(#shine)" opacity="0.9"/>

    <text class="font desc muted" x="36" y="314">I'm a developer passionate about</text>
    <text class="font desc white" x="36" y="352">coding, automation, APIs, and web development.</text>
    <text class="font desc muted" x="36" y="390">I enjoy turning ideas into clean, useful,</text>
    <text class="font desc muted" x="36" y="428">and powerful digital tools.</text>

    <!-- tags -->
    <g transform="translate(36 466)">
      <rect x="0" y="0" width="82" height="38" rx="19" fill="#ffffff" fill-opacity="0.075" stroke="#ffffff" stroke-opacity="0.18"/>
      <text class="font tagText muted" x="41" y="25" text-anchor="middle">Python</text>

      <rect x="98" y="0" width="96" height="38" rx="19" fill="#ffffff" fill-opacity="0.075" stroke="#ffffff" stroke-opacity="0.18"/>
      <text class="font tagText muted" x="146" y="25" text-anchor="middle">Web Dev</text>

      <rect x="210" y="0" width="126" height="38" rx="19" fill="#ffffff" fill-opacity="0.075" stroke="#ffffff" stroke-opacity="0.18"/>
      <text class="font tagText muted" x="273" y="25" text-anchor="middle">Automation</text>

      <rect x="352" y="0" width="112" height="38" rx="19" fill="#ffffff" fill-opacity="0.075" stroke="#ffffff" stroke-opacity="0.18"/>
      <text class="font tagText muted" x="408" y="25" text-anchor="middle">API Tools</text>
    </g>
  </g>

  <!-- Skill dock -->
  <g transform="translate(78 704)" filter="url(#cardGlow)">
    <rect x="0" y="0" width="610" height="118" rx="26" fill="#111111" fill-opacity="0.88" stroke="#ffffff" stroke-opacity="0.22"/>
    <g transform="translate(24 20)">
      <!-- JS -->
      <g transform="translate(0 0)">
        <rect width="126" height="78" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.18"/>
        <rect x="42" y="12" width="42" height="42" rx="9" fill="none" stroke="#ffffff" stroke-opacity="0.88" stroke-width="2"/>
        <text class="terminal codeText white" x="63" y="42" text-anchor="middle">JS</text>
        <text class="font tagText muted" x="63" y="68" text-anchor="middle">JavaScript</text>
      </g>

      <!-- React -->
      <g transform="translate(146 0)">
        <rect width="126" height="78" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.18"/>
        <ellipse cx="63" cy="32" rx="31" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.88" stroke-width="2"/>
        <ellipse cx="63" cy="32" rx="31" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.72" stroke-width="2" transform="rotate(60 63 32)"/>
        <ellipse cx="63" cy="32" rx="31" ry="10" fill="none" stroke="#ffffff" stroke-opacity="0.72" stroke-width="2" transform="rotate(120 63 32)"/>
        <circle cx="63" cy="32" r="4" fill="#ffffff"/>
        <text class="font tagText muted" x="63" y="68" text-anchor="middle">React</text>
      </g>

      <!-- Node -->
      <g transform="translate(292 0)">
        <rect width="126" height="78" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.18"/>
        <path d="M63 10L88 24.5V52.5L63 67L38 52.5V24.5Z" fill="none" stroke="#ffffff" stroke-opacity="0.88" stroke-width="2.2"/>
        <text class="terminal codeText white" x="63" y="44" text-anchor="middle">N</text>
        <text class="font tagText muted" x="63" y="68" text-anchor="middle">Node.js</text>
      </g>

      <!-- GitHub -->
      <g transform="translate(438 0)">
        <rect width="126" height="78" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.18"/>
        <path fill="#ffffff" opacity="0.9" transform="translate(39 7) scale(0.74)" d="M32 8C18.7 8 8 18.8 8 32.2c0 10.6 6.8 19.6 16.2 22.8 1.2.2 1.7-.5 1.7-1.2v-4.2c-6.6 1.5-8-2.8-8-2.8-1.1-2.8-2.7-3.6-2.7-3.6-2.2-1.5.2-1.5.2-1.5 2.4.2 3.7 2.5 3.7 2.5 2.2 3.7 5.7 2.6 7.1 2 .2-1.6.8-2.6 1.5-3.2-5.3-.6-10.8-2.7-10.8-11.8 0-2.6.9-4.7 2.5-6.4-.3-.6-1.1-3.1.2-6.3 0 0 2-.6 6.6 2.5 1.9-.5 3.9-.8 5.9-.8s4 .3 5.9.8c4.6-3.1 6.6-2.5 6.6-2.5 1.3 3.2.5 5.7.2 6.3 1.6 1.7 2.5 3.8 2.5 6.4 0 9.2-5.6 11.2-10.9 11.8.9.8 1.7 2.3 1.7 4.6v6.9c0 .7.5 1.4 1.7 1.2C49.2 51.8 56 42.8 56 32.2 56 18.8 45.3 8 32 8Z"/>
        <text class="font tagText muted" x="63" y="68" text-anchor="middle">GitHub</text>
      </g>
    </g>
  </g>

  <!-- Right wire globe -->
  <g opacity="0.95">
    <ellipse class="orbit" cx="1115" cy="445" rx="330" ry="105" transform="rotate(-18 1115 445)">
      <animate attributeName="stroke-dashoffset" from="0" to="-120" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse class="orbit" cx="1115" cy="445" rx="292" ry="88" transform="rotate(24 1115 445)">
      <animate attributeName="stroke-dashoffset" from="0" to="-120" dur="7s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <circle cx="1115" cy="445" r="248" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2" filter="url(#glow)"/>

  <g clip-path="url(#globeClip)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 1115 445" to="360 1115 445" dur="24s" repeatCount="indefinite"/>

      <!-- globe shell -->
      <circle class="globeStrong" cx="1115" cy="445" r="220"/>

      <!-- longitude -->
      <ellipse class="globeSoft" cx="1115" cy="445" rx="176" ry="220"/>
      <ellipse class="globeSoft" cx="1115" cy="445" rx="128" ry="220"/>
      <ellipse class="globeSoft" cx="1115" cy="445" rx="76" ry="220"/>
      <ellipse class="globeStrong" cx="1115" cy="445" rx="32" ry="220"/>
      <ellipse class="globeSoft" cx="1115" cy="445" rx="76" ry="220" transform="rotate(90 1115 445)"/>
      <ellipse class="globeSoft" cx="1115" cy="445" rx="128" ry="220" transform="rotate(90 1115 445)"/>
      <ellipse class="globeSoft" cx="1115" cy="445" rx="176" ry="220" transform="rotate(90 1115 445)"/>

      <!-- latitude -->
      <ellipse class="globeStrong" cx="1115" cy="445" rx="220" ry="28"/>
      <ellipse class="globeSoft" cx="1115" cy="395" rx="212" ry="26"/>
      <ellipse class="globeSoft" cx="1115" cy="495" rx="212" ry="26"/>
      <ellipse class="globeSoft" cx="1115" cy="345" rx="180" ry="22"/>
      <ellipse class="globeSoft" cx="1115" cy="545" rx="180" ry="22"/>
      <ellipse class="globeSoft" cx="1115" cy="300" rx="126" ry="16"/>
      <ellipse class="globeSoft" cx="1115" cy="590" rx="126" ry="16"/>

      <!-- diagonal accents -->
      <path class="globeSoft" d="M920 343C1018 412 1210 412 1310 343"/>
      <path class="globeSoft" d="M920 547C1018 478 1210 478 1310 547"/>
    </g>
  </g>

  <circle class="globeStrong" cx="1115" cy="445" r="220"/>
  <circle cx="1115" cy="445" r="222" fill="none" stroke="#ffffff" stroke-opacity="0.20" stroke-width="1.5"/>

  <!-- small satellites / nodes -->
  <g filter="url(#glow)">
    <circle cx="845" cy="378" r="4.5" fill="#ffffff"/>
    <circle cx="1390" cy="515" r="4.5" fill="#ffffff"/>
    <circle cx="1245" cy="184" r="3.2" fill="#ffffff" opacity="0.85"/>
    <path d="M852 378C910 390 956 404 1002 425" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.4" stroke-dasharray="7 10"/>
    <path d="M1330 486C1350 495 1368 505 1390 515" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.4" stroke-dasharray="7 10"/>
  </g>

  <!-- bottom code line -->
  <g transform="translate(780 785)" opacity="0.64">
    <rect x="0" y="0" width="620" height="42" rx="21" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <text class="terminal codeText muted" x="24" y="27">&gt; building clean tools, automation systems, and APIs</text>
  </g>

  <!-- vignette -->
  <radialGradient id="vignette" cx="72%" cy="50%" r="72%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="60%" stop-color="#000000" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.80"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)" pointer-events="none"/>
</svg>
